<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>ნანასთვის ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:sans-serif;
text-align:center;
overflow:hidden;
color:white;
}

.container{
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:20px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4d6d;
color:white;
position:relative;
}

#message{
margin-top:20px;
font-size:22px;
}

.heart{
position:absolute;
color:white;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}

</style>
</head>

<body>

<div class="container">

<h1>ნანა ❤️</h1>

<p>
ერთი რამ უნდა გითხრა...
<br><br>
შენ ძალიან ძალიან მომწონხარ  
და უკვე სერიოზულად ვგიჟდები შენზე 😊
</p>

<h3>გამოხვალ ჩემთან ერთად?</h3>

<button id="yes" onclick="yesClick()">YES ❤️</button>
<button id="no" onmouseover="moveButton()">NO 😅</button>

<div id="message"></div>

</div>

<script>

function yesClick(){
document.getElementById("message").innerHTML =
"ძალიან გამახარე ნანა ❤️";
}

function moveButton(){
let button = document.getElementById("no");

let x = Math.random()*300-150;
let y = Math.random()*300-150;

button.style.transform = "translate("+x+"px,"+y+"px)";
}

function createHeart(){
let heart = document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
