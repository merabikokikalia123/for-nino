<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Nana ❤️</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  font-family:sans-serif;
  overflow:hidden;
  color:white;
  text-align:center;
}
.container{
  background:rgba(0,0,0,0.4);
  padding:40px;
  border-radius:20px;
}
button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:10px;
}
#yes{
  background:#4CAF50;
  color:white;
}
#no{
  background:#ff4d6d;
  color:white;
  position:relative;
}
.heart{
  position:absolute;
  font-size:20px;
  animation:fall 6s linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(100vh);}
}
iframe{
  display:none; /* ვიდეო არ ჩანს, უბრალოდ მუსიკა გადის ფონურად */
}
</style>
</head>
<body>
<div class="container">
<h1 id="title"></h1>
<p>
ნანათი ❤️  
ძალიან ძალიან მომწონხარ  
და უკვე ვგიჟდები შენზე...
</p>
<h3>გამოხვალ ჩემთან ერთად?</h3>
<button id="yes" onclick="yesClick()">YES ❤️</button>
<button id="no" onmouseover="moveButton()">NO 😅</button>
<p id="result"></p>
<button onclick="playMusic()">🎵 მუსიკის ჩართვა</button>
</div>

<div id="music"></div>

<script>
// ნელა დაწერილი ტექსტი
let text="Nanati ❤️";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("title").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,100);
  }
}
typing();

// YES ღილაკი
function yesClick(){
  document.getElementById("result").innerHTML="ძალიან გამახარე ❤️🎉";
}

// NO ღილაკი გარბის
function moveButton(){
  let button=document.getElementById("no");
  let x=Math.random()*300-150;
  let y=Math.random()*300-150;
  button.style.transform="translate("+x+"px,"+y+"px)";
}

// გულების ანიმაცია
function createHeart(){
  let heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(20+Math.random()*20)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,400);

// ფონური YouTube მუსიკა
function playMusic(){
  if(!document.getElementById("ytplayer")){
    document.getElementById("music").innerHTML=
    `<iframe id="ytplayer" width="0" height="0"
    src="https://www.youtube.com/embed/nA2mRZcLuAI?autoplay=1&loop=1&playlist=nA2mRZcLuAI"
    frameborder="0"
    allow="autoplay; encrypted-media"></iframe>`;
  }
}
</script>
</body>
</html>
